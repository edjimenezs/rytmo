version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: streho_postgres
    restart: always
    environment:
      POSTGRES_USER: streho_user
      POSTGRES_PASSWORD: streho_password
      POSTGRES_DB: streho_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
